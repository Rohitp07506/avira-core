<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AVIRA System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="system-header">
    <h1>AVIRA</h1>
    <p>Adaptive Virtual Intelligence Response Architecture</p>
  </div>

  <div class="core-container">
    <div id="coreButton" class="core"></div>
  </div>

  <div id="statusText" class="status">SYSTEM IDLE</div>

  <div class="metrics">
    <div>Intelligence Level: <span id="intelligenceLevel">0</span></div>
    <div>Interactions: <span id="interactionCount">0</span></div>
    <div>Success Rate: <span id="successRate">0</span>%</div>
    <div>Memory Size: <span id="memorySize">0</span></div>
    <div>Uptime: <span id="uptime">0s</span></div>
  </div>

  <canvas id="waveform"></canvas>

  <script src="main.js"></script>
</body>
</html>
